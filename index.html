<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>福利群入口</title>

<style>
body{
    margin:0;
    background:#f4f6f8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    text-align:center;
}

.container{
    max-width:420px;
    margin:60px auto;
    background:#ffffff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

h1{
    font-size:22px;
    margin-bottom:10px;
    color:#333;
}

p{
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

.qr{
    width:260px;
    border-radius:12px;
}

.tip{
    margin-top:15px;
    font-size:13px;
    color:#ff4d4f;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#999;
}
</style>
</head>

<body>

<div class="container">
    <h1>微信扫码进入福利群</h1>
    <p id="desc">请使用微信扫码进入</p>

    <img id="qrImage" class="qr">

    <div class="tip" id="browserTip"></div>

    <div class="footer">
        如二维码失效请刷新页面
    </div>
</div>

<script>

// ===== 防缓存加载二维码 =====
document.getElementById("qrImage").src =
"qr.jpg?v=" + Date.now();

// ===== 判断是否微信内 =====
function isWeChat() {
    return /micromessenger/i.test(navigator.userAgent);
}

if (!isWeChat()) {
    document.getElementById("browserTip").innerHTML =
    "当前为浏览器环境，请长按保存图片后打开微信扫一扫";
}

</script>

</body>
</html>
