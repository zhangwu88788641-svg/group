<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>福利情报站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #ff3b30;
            font-size: 24px;
        }

        .count {
            margin: 15px 0;
            font-size: 16px;
            color: #666;
        }

        img {
            width: 260px;
            height: auto;
            margin-top: 20px;
            border-radius: 10px;
        }

        .tip {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 25px;
            background: #ff3b30;
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e63228;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎁 微信长安扫码进群</h1>
    <div class="count">非微信请保存图片打开微信扫码进群</div>

    <!-- 图片路径写法 -->
    <img src="qrcode.jpg" alt="微信群二维码">
    <div class="tip">已入群3272人</div>

</div>

</body>
</html>
